<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상세 분석 리포트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">📅 환율 데이터 상세 목록</h3>
            <a href="/" class="btn btn-outline-secondary btn-sm">메인으로 돌아가기</a>
        </div>

        <div class="card bg-light border-0 p-4 mb-4">
            <form action="/details" method="get" class="row g-3 align-items-end justify-content-center">
                <div class="col-md-6">
                    <label class="form-label small fw-bold">조회할 날짜 선택</label>
                    <div class="input-group">
                        <input type="date" name="search_date" class="form-control">
                        <button type="submit" class="btn btn-primary px-4">조회하기</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle border-top text-center">
                <thead class="table-light">
                    <tr>
                        <th>날짜</th>
                        <th>통화 (단위)</th>
                        <th>매매기준율 (원)</th>
                    </tr>
                </thead>
                <tbody>
                    {% if rates %}
                        {% for rate in rates %}
                        <tr>
                            <td>{{ rate.date }}</td>
                            <td><span class="badge bg-secondary">{{ rate.cur_unit }}</span></td>
                            <td class="fw-bold">{{ rate.deal_bas_r }}</td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="3" class="py-4 text-muted">선택하신 날짜에 수집된 데이터가 없습니다.</td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>

        <div class="text-end mt-4">
            <a href="/email" class="btn btn-info text-white px-4 shadow-sm">이메일로 리포트 전송</a>
        </div>
    </div>
</body>
</html>

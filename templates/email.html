<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리포트 전송</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 p-5">
                    <h3 class="fw-bold mb-4">리포트 이메일 전송</h3>
                    <form action="/email" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">수신 이메일</label>
                            <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">추가 전달 메시지</label>
                            <textarea name="content" class="form-control" rows="5" placeholder="리포트와 함께 보낼 내용을 입력하세요."></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">엑셀 포함 전송하기</button>
                            <a href="/details" class="btn btn-link text-secondary text-decoration-none">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
